{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Add Lesson</h2>

<form method="POST" enctype="multipart/form-data" class="space-y-4 max-w-lg">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Lesson Title"
           class="w-full p-3 border rounded-lg" required>

    <textarea name="content" placeholder="Lesson notes"
              class="w-full p-3 border rounded-lg"></textarea>

    <input type="file" name="video"
           class="w-full p-3 border rounded-lg" required>

    <button type="submit"
            class="bg-blue-600 text-white px-6 py-2 rounded-lg">
        Upload Lesson
    </button>

</form>

{% endblock %}
