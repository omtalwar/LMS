<!DOCTYPE html>
<html>
<head>
    <title>LMS</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Animations -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            font-family: system-ui;
        }
    </style>
</head>

<body class="bg-gray-50">

<!-- 🔥 NAVBAR -->
<nav class="bg-white shadow-sm sticky top-0 z-50 border-b">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <!-- Logo -->
        <a href="/" class="text-2xl font-bold text-blue-600 tracking-tight">
            LMS
        </a>

        <!-- Links -->
        <div class="flex items-center space-x-6 text-sm font-medium">

            <a href="/" class="text-gray-700 hover:text-blue-600 transition">
                Home
            </a>

            <a href="/dashboard/" class="text-gray-700 hover:text-blue-600 transition">
                Dashboard
            </a>

            {% if user.is_authenticated %}
                <span class="text-gray-500 hidden sm:block">
                    👋 {{ user.username }}
                </span>

                <a href="/logout/"
                   class="text-red-500 hover:text-red-600 transition">
                    Logout
                </a>
            {% else %}
                <a href="/login/"
                   class="text-blue-600 hover:underline">
                    Login
                </a>

                <a href="/signup/"
                   class="bg-blue-600 text-white px-4 py-1.5 rounded-lg hover:bg-blue-700 transition">
                    Signup
                </a>
            {% endif %}

        </div>
    </div>
</nav>

<!-- 🔥 MAIN CONTENT -->
<main class="min-h-[80vh]">
    <div class="max-w-7xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </div>
</main>

<!-- 🔥 FOOTER -->
<footer class="bg-white border-t mt-12">
    <div class="max-w-7xl mx-auto px-6 py-6 text-center text-sm text-gray-500">
        © 2026 LMS • Built with Django
    </div>
</footer>

<!-- Animations -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 700,
        once: true
    });
</script>

</body>
</html>
